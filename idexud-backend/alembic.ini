# =============================================================================
#  alembic.ini — Sistema de Pólizas Idexud / Universidad Distrital
#
#  IMPORTANTE: La URL de la base de datos NO se define aquí.
#  Se inyecta desde app/core/config.py en alembic/env.py.
#  La línea sqlalchemy.url queda vacía intencionalmente para que
#  jamás haya credenciales en el repositorio Git.
# =============================================================================

[alembic]

# Ruta a la carpeta de migraciones, relativa a este archivo
script_location = alembic

# Formato del nombre de los archivos de migración.
# Ejemplo: 2024_07_15_0930-3a2f1b8c_crear_tabla_polizas.py
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# El directorio raíz del proyecto se agrega a sys.path automáticamente
# para que "from app.core.config import settings" funcione sin instalar el paquete.
prepend_sys_path = .

# Máx. caracteres del slug (descripción corta en el nombre del archivo)
truncate_slug_length = 60

# URL — se sobreescribe programáticamente desde alembic/env.py
# con el valor de settings.DATABASE_URL_SYNC. No poner credenciales aquí.
sqlalchemy.url =

# =============================================================================
#  Logging
# =============================================================================

[loggers]
keys = root, sqlalchemy, alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level     = WARN
handlers  = console
qualname  =

[logger_sqlalchemy]
level     = WARN
handlers  =
qualname  = sqlalchemy.engine

[logger_alembic]
level     = INFO
handlers  =
qualname  = alembic

[handler_console]
class     = StreamHandler
args      = (sys.stderr,)
level     = NOTSET
formatter = generic

[formatter_generic]
format    = %(levelname)-5.5s [%(name)s] %(message)s
datefmt   = %H:%M:%S
